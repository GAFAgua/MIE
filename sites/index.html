<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>羊纹杏形金叶 / 三个网页版本</title>
    <style>
      :root {
        --bg: #f8f8f8;
        --text: #333333;
        --line: #b3b3b3;
        --accent: #00ff00;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font-family: "Helvetica Neue", Helvetica, Arial, "PingFang SC", "Noto Sans CJK SC",
          "Microsoft YaHei", sans-serif;
        font-size: clamp(18px, 2vw, 30px);
        font-weight: 500;
        letter-spacing: -0.3px;
      }

      header {
        display: flex;
        justify-content: space-between;
        gap: 2rem;
        padding: clamp(18px, 2vw, 38px);
      }

      h1 {
        margin: 0;
        font-size: clamp(54px, 8vw, 132px);
        line-height: 0.9;
        font-weight: 500;
        letter-spacing: -0.05em;
      }

      main {
        width: min(78vw, 1180px);
        margin: 18vh 0 12vh auto;
        padding-right: clamp(18px, 2vw, 38px);
      }

      a {
        display: grid;
        grid-template-columns: minmax(120px, 18vw) 1fr auto;
        gap: 2vw;
        align-items: center;
        min-height: clamp(92px, 10vw, 150px);
        color: inherit;
        text-decoration: none;
        border-top: 1px solid var(--line);
      }

      a:last-child {
        border-bottom: 1px solid var(--line);
      }

      a span:last-child {
        color: var(--accent);
      }

      @media (max-width: 760px) {
        main {
          width: auto;
          margin: 14vh 18px 10vh;
          padding-right: 0;
        }

        a {
          grid-template-columns: 1fr;
          gap: 0.4rem;
          padding: 1rem 0;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>杏叶°</h1>
      <p>三个版本</p>
    </header>
    <main aria-label="版本入口">
      <a href="./archive/#archive">
        <span>01</span>
        <span>档案入口版</span>
        <span>Archive</span>
      </a>
      <a href="./model/#object">
        <span>02</span>
        <span>3D 主展示版</span>
        <span>Model</span>
      </a>
      <a href="./pattern/#pattern">
        <span>03</span>
        <span>纹样入口版</span>
        <span>Pattern</span>
      </a>
    </main>
  </body>
</html>
