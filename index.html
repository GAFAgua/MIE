<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MIE | 羊头纹杏形金叶 3D观察台</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app" data-scene="idle" data-report="closed">
      <section class="desk" aria-label="羊头纹杏形金叶 3D观察台">
        <header class="topbar">
          <div>
            <p class="eyebrow">MIE DIGITAL RELIC OBSERVATORY</p>
            <h1>羊头纹杏形金叶</h1>
          </div>
          <div class="progress">
            <span id="progressText">已观察 0/6</span>
            <div class="progress-track" aria-hidden="true">
              <span id="progressFill"></span>
            </div>
          </div>
        </header>

        <div class="workspace">
          <section class="viewer" aria-label="3D 金叶模型观察区">
            <div class="axis-label axis-x">X 纹样轴</div>
            <div class="axis-label axis-y">Y 对称轴</div>

            <div class="model-stage" id="modelStage">
              <div class="focus-frame" aria-hidden="true">
                <span></span>
                <span></span>
                <span></span>
                <span></span>
              </div>

              <div class="leaf-model" id="leafModel">
                <div class="leaf-thickness depth-a"></div>
                <div class="leaf-thickness depth-b"></div>
                <div class="leaf-thickness depth-c"></div>

                <div class="leaf-face">
                  <img src="assets/yangtou-jinye.jpeg" alt="羊头纹杏形金叶文物纹理" />
                  <div class="gold-film"></div>
                  <div class="specular-sweep"></div>

                  <svg class="relic-overlay" viewBox="0 0 540 470" aria-hidden="true">
                    <defs>
                      <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
                        <feGaussianBlur stdDeviation="3" result="blur" />
                        <feMerge>
                          <feMergeNode in="blur" />
                          <feMergeNode in="SourceGraphic" />
                        </feMerge>
                      </filter>
                    </defs>

                    <path
                      class="outline-line"
                      d="M270 13 C360 16 484 79 512 196 C535 291 490 392 421 444 L120 444 C50 390 18 286 37 196 C61 82 177 16 270 13 Z"
                    />

                    <g class="relief-lines">
                      <path d="M112 150 C170 98 219 82 270 88 C323 82 374 98 428 150" />
                      <path d="M122 205 C178 150 226 140 270 160 C315 140 366 150 420 205" />
                      <path d="M136 263 C183 224 228 214 270 232 C313 214 361 224 406 263" />
                      <path d="M156 326 C205 294 236 292 270 306 C304 292 337 294 384 326" />
                      <path d="M194 382 C226 362 249 358 270 367 C291 358 316 362 348 382" />
                    </g>

                    <g class="ram-lines">
                      <path d="M236 146 C206 101 153 101 124 139 C96 176 103 234 151 252" />
                      <path d="M304 146 C334 101 387 101 416 139 C444 176 437 234 389 252" />
                      <path d="M233 175 C191 150 151 164 134 202 C117 241 140 282 184 286" />
                      <path d="M307 175 C349 150 389 164 406 202 C423 241 400 282 356 286" />
                      <path d="M224 242 C200 282 193 328 218 374" />
                      <path d="M316 242 C340 282 347 328 322 374" />
                    </g>

                    <line class="axis-line" x1="270" y1="44" x2="270" y2="427" />
                    <g class="symmetry-lines left">
                      <path d="M257 92 C210 112 184 150 177 204 C170 258 191 318 232 374" />
                      <path d="M246 138 C205 164 190 199 201 239 C213 278 231 307 245 346" />
                    </g>
                    <g class="symmetry-lines right">
                      <path d="M283 92 C330 112 356 150 363 204 C370 258 349 318 308 374" />
                      <path d="M294 138 C335 164 350 199 339 239 C327 278 309 307 295 346" />
                    </g>

                    <g class="hole-points">
                      <circle cx="245" cy="20" r="7" />
                      <circle cx="287" cy="20" r="7" />
                      <circle cx="51" cy="220" r="7" />
                      <circle cx="489" cy="220" r="7" />
                      <circle cx="38" cy="292" r="7" />
                      <circle cx="502" cy="292" r="7" />
                      <circle cx="240" cy="443" r="7" />
                      <circle cx="288" cy="443" r="7" />
                    </g>

                    <g class="stitch-lines">
                      <path d="M245 20 C191 80 107 153 51 220" />
                      <path d="M287 20 C349 83 434 153 489 220" />
                      <path d="M38 292 C95 348 157 411 240 443" />
                      <path d="M502 292 C443 348 371 413 288 443" />
                    </g>

                    <path
                      class="head-silhouette"
                      d="M270 116 C333 116 386 161 386 225 C386 290 343 330 312 354 L312 398 L228 398 L228 354 C197 330 154 290 154 225 C154 161 207 116 270 116 Z"
                    />
                  </svg>
                </div>
              </div>

              <div class="lens" id="lens" aria-hidden="true"></div>
            </div>

            <div class="annotation annotation-a">
              <span></span>
              <p id="annotationLabel">拖动金叶可轻微旋转，按 1-6 进入观察镜头</p>
            </div>
          </section>

          <aside class="inspector" aria-label="观察清单">
            <div class="scene-card">
              <p class="scene-kicker" id="sceneKicker">OBSERVATION DESK</p>
              <h2 id="sceneTitle">白底 3D 金叶观察台</h2>
              <p id="sceneText">选择一个观察点，查看金叶的形状、材质、工艺、纹样、结构和用途。</p>
            </div>

            <div class="detail-card">
              <p>观察点</p>
              <strong id="detailFeature">完整金叶</strong>
              <span id="detailTranslate">当前为待观察状态，模型可拖动旋转。</span>
            </div>

            <nav class="controls" aria-label="六个观察点">
              <button type="button" data-key="1">
                <span>1</span>
                <strong>杏形轮廓</strong>
                <em>未观察</em>
              </button>
              <button type="button" data-key="2">
                <span>2</span>
                <strong>金箔薄片</strong>
                <em>未观察</em>
              </button>
              <button type="button" data-key="3">
                <span>3</span>
                <strong>锤鍱纹理</strong>
                <em>未观察</em>
              </button>
              <button type="button" data-key="4">
                <span>4</span>
                <strong>羊头纹</strong>
                <em>未观察</em>
              </button>
              <button type="button" data-key="5">
                <span>5</span>
                <strong>双羊相背</strong>
                <em>未观察</em>
              </button>
              <button type="button" data-key="6">
                <span>6</span>
                <strong>缝缀小孔</strong>
                <em>未观察</em>
              </button>
            </nav>
          </aside>
        </div>
      </section>

      <section class="report" aria-label="观察报告" aria-hidden="true">
        <div class="report-panel">
          <p class="eyebrow">OBSERVATION REPORT</p>
          <h2>六个文物特征已完成观察</h2>
          <p class="report-summary">杏形、金箔、锤鍱、羊纹、对称、缝缀共同构成这件金叶的视觉与功能特征。</p>
          <div class="report-grid" id="reportGrid"></div>
          <button class="reset-button" type="button" id="resetButton">重新观察</button>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
